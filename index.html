<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clay Friends</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    #logo-wrap {
      text-align: center;
      padding: 24px 20px 10px;
    }

    #logo {
      max-width: 400px;
      width: 100%;
      height: auto;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .tile {
      position: relative;
      display: block;
      text-decoration: none;
      color: white;
      background: #111;
      overflow: hidden;
    }

    .tile img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .hover-number {
      position: absolute;
      inset: auto 0 0 0;
      background: rgba(0,0,0,0.75);
      padding: 8px 10px;
      font-size: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .tile:hover .hover-number {
      opacity: 1;
    }
    .grid img {
  transition: transform 0.2s ease;
}

.grid img:hover {
  transform: scale(1.06);
}  </style>
</head>
<body>
  <div id="logo-wrap">
    <img id="logo" src="logo.png" alt="Clay Friends logo">
  </div>

  <div id="gallery"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    loadGallery();
  </script>
</body>
</html>
